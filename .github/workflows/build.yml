name: Build RORSH-ADMIN Windows EXE

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout your code ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Install dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller websockets mss Pillow

      # ── 4. Build the EXE ────────────────────────────────────────────────
      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name RORSH-ADMIN-4.0.0 --icon IV2/RORSH-ADMIN.ico main.py

      # ── 5. Upload the EXE as artifact ───────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: RORSH-ADMIN-4.0.0
          path: dist/RORSH-ADMIN-4.0.0.exe

      # ── 6. (Optional) Create GitHub Release with EXE ───────────────────
      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/RORSH-ADMIN-4.0.0.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
